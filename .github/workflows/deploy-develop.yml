name: "Identity Service: CI/CD"

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  ci:
    uses: long1712578/Dragon-k8s-config/.github/workflows/reusable-dotnet-ci.yml@master
    with:
      dotnet-version: '9.0.x'
      solution-path: 'src/IdentityService.API/IdentityService.API.csproj'
      # test-path: 'tests/IdentityService.Tests.csproj'  # Bật khi có test project
    secrets: inherit

  cd:
    needs: ci
    uses: long1712578/Dragon-k8s-config/.github/workflows/reusable-docker-gitops.yml@master
    with:
      service-name: 'identity-service'
      docker-context: '.'
      environment: 'develop'
    secrets: inherit
